# GitHub Actions workflow to build kepler-formal and run it on the example inputs
name: regress

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    # install dependencies
    - name: Install GoogleTest
      run: sudo apt-get update && sudo apt-get install -y libgtest-dev cmake
    - name: Checkout submodules
      run: git submodule update --init --recursive
    - name: Install boost & capnproto
      run: sudo apt-get update && sudo apt-get install -y pkg-config libboost-dev libfl-dev capnproto libcapnp-dev ninja-build clang libtbb-dev libspdlog-dev libboost-iostreams-dev zlib1g-dev
      
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -GNinja -DCMAKE_C_COMPILER=clang -DENABLE_SANITIZERS=ON -DPYTHON_INTERFACE=OFF -DCMAKE_CXX_STANDARD=20
    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      env:
        PYTHONMALLOC: malloc
      # Execute tests defined by the CMake configuration.  
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest -VV -E ".*[p|P]ython.*" -C ${{env.BUILD_TYPE}}
    
    - name: Clone kepler-formal-regress
      working-directory: ${{github.workspace}}
      run: |
        git clone https://github.com/keplertech/kepler-formal-regress
    
    - name: Run cts_aes_asap7_base
      working-directory: ${{github.workspace}}
      run: |
        cd kepler-formal-regress/cts_aes_asap7_base
        ../../build/src/bin/kepler-formal --config objects/asap7/aes/base/4_rsz_lec_test.yml
        grep "Circuits are IDENTICAL" logs/asap7/aes/base/4_rsz_lec_check.log
  
    - name: Run sky130hd_gcd
      working-directory: ${{github.workspace}}
      run: |
        cd kepler-formal-regress/sky130hd_gcd
        ../../build/src/bin/kepler-formal --config objects/sky130hd/gcd/base/4_rsz_lec_test.yml 
        grep "Circuits are IDENTICAL" logs/sky130hd/gcd/base/4_rsz_lec_check.log 
    
    - name: Run nangate45_black_parrot
      working-directory: ${{github.workspace}}
      run: |
        cd kepler-formal-regress/nangate45_black_parrot
        ../../build/src/bin/kepler-formal --config objects/nangate45/bp/base/4_rsz_lec_test.yml
        grep "Circuits are IDENTICAL" logs/nangate45/bp/base/4_rsz_lec_check.log 
    
    - name: Run ihp-sg13g2_i2c-gpio-expander
      working-directory: ${{github.workspace}}
      run: |
        cd kepler-formal-regress/ihp-sg13g2_i2c-gpio-expander
        ../../build/src/bin/kepler-formal --config objects/ihp-sg13g2/i2c-gpio-expander/base/4_rsz_lec_test.yml
        grep "Circuits are IDENTICAL" logs/ihp-sg13g2/i2c-gpio-expander/base/4_rsz_lec_check.log 
  
    - name: Run on naja if
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p regress-output
        # Run kepler-formal on the example files (files are in example/)
        ./build/src/bin/kepler-formal -naja_if \
          ./example/tinyrocket_naja.if \
          ./example/tinyrocket_naja.if \
          ./example/NangateOpenCellLibrary_typical.lib \
          ./example/fakeram45_1024x32.lib \
          ./example/fakeram45_64x32.lib 
    
    - name: Run on verilog
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p regress-output
        # Run kepler-formal on the example files (files are in example/)
        ./build/src/bin/kepler-formal -verilog \
          ./example/tinyrocket.v \
          ./example/tinyrocket.v \
          ./example/NangateOpenCellLibrary_typical.lib \
          ./example/fakeram45_1024x32.lib \
          ./example/fakeram45_64x32.lib 
          
    - name: Install najaeda
      run: pip install najaeda

    - name: Execute edit.py
      working-directory: ${{github.workspace}}/example
      run: python edit.py

    - name: Run on naja if edited
      working-directory: ${{github.workspace}}/example
      run: |
        mkdir -p regress-output
        # Run kepler-formal on the example files (files are in example/)
        ../build/src/bin/kepler-formal --config test_config_naja_if.yaml
    
    - name: Run on verilog edited
      working-directory: ${{github.workspace}}/example
      run: |
        mkdir -p regress-output
        # Run kepler-formal on the example files (files are in example/)
        ../build/src/bin/kepler-formal --config test_config_verilog.yaml